<VirtualHost *:80>
    ServerName picpicpdf.path-finder.jp
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName picpicpdf.path-finder.jp

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/path-finder.jp/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/path-finder.jp/privkey.pem

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3029/
    ProxyPassReverse / http://127.0.0.1:3029/

    # Allow large PDF uploads (100MB)
    LimitRequestBody 104857600

    ErrorLog /var/log/httpd/picpicpdf-error.log
    CustomLog /var/log/httpd/picpicpdf-access.log combined
</VirtualHost>
